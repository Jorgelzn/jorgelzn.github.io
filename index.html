<!DOCTYPE html>
<html lang=es>

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Jorgelzn</title>
        <link class="icon" rel="icon" href="images/icon.png">
        <link rel="stylesheet" href="styles/main.css">
    </head>

    <body>

        <div id="title-bg">
            <div id="title-box">
                <h1>Jorge Lizcano</h1>
                <p>Computer Science Engineer</p>
                <img class="icon" id="logo" src="images/icon.png" alt="logo">
            </div>
        </div>

        <div id="target-gallery">

            <div class="target-gallery-container">
                <div class="content">
                    <a class="target" onclick="show('web')" href="#web-banner">
                        <div class="img-cont">
                            <img src="images/web.png" alt="">
                        </div>
                    </a>
                </div>
                <div class="gallery-text">
                    <p>Web &nbsp development</p>
                </div>
            </div>

            <div class="target-gallery-container">
                <div class="content">
                    <a class="target" onclick="show('ai')" href="#ai-banner">
                        <div class="img-cont">
                            <img src="images/ai.png" alt="">
                        </div>
                    </a>
                </div>
                <div class="gallery-text">
                    <p>Artificial Intelligence</p>
                </div>
            </div>

            <div class="target-gallery-container">
                <div class="content">
                    <a class="target" onclick="show('games')" href="#games-banner">
                        <div class="img-cont">
                            <img src="images/games.png" alt="">
                        </div>
                    </a>
                </div>
                <div class="gallery-text">
                    <p>Game Development</p>
                </div>
            </div>

        </div>

        <div class="video-banner video-banner" id="ai-banner">
            <div class="cover cover">
                <div class="banner-text">
                    <p>I have worked in the implementation of automatic agents using machine learning algorithms</p>
                </div>
            </div>
            <video class="video" preload="auto" playsinline="" loop="" muted="" autoplay="">
                <source src="videos/pacman.mp4" type="video/mp4">
            </video> 
        </div>

        <div class="video-banner video-banner" id="games-banner">
            <div class="cover cover">
                <div class="banner-text">
                    <p>I have developed a version of the retro videogame galaga</p>
                </div>
            </div>
            <video  id="galaga" class="video" preload="auto" playsinline="" loop="" muted="" autoplay="">
                <source src="videos/galaga.mp4" type="video/mp4">
            </video> 
        </div>

        <div class="video-banner video-banner" id="web-banner">
            <div class="cover cover">
                <div class="banner-text">
                    <p>web development</p>
                </div>
            </div>
            <video  id="galaga" class="video" preload="auto" playsinline="" loop="" muted="" autoplay="">
                <source src="videos/galaga.mp4" type="video/mp4">
            </video> 
        </div>

        <footer>

        </footer>

        <script src="scripts/main.js"></script>
    </body>

</html>
